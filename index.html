// ── Player timeline engine (identical to main app) ──────────────────────────
function buildPlayerTimeline(savesArr) {
  const directOwned = new Map();
  savesArr.forEach((s, si) => {
    s.countries.forEach(c => {
      if (!c.player) return;
      if (!directOwned.has(c.player)) directOwned.set(c.player, new Map());
      directOwned.get(c.player).set(si, c.tag);
    });
  });
  const tagOwnerCount = new Map();
  directOwned.forEach((sessMap, player) => {
    sessMap.forEach((tag, si) => {
      if (!tagOwnerCount.has(tag)) tagOwnerCount.set(tag, new Map());
      const m = tagOwnerCount.get(tag);
      const cur = m.get(player) || { count: 0, lastSi: -1 };
      m.set(player, { count: cur.count + 1, lastSi: Math.max(cur.lastSi, si) });
    });
  });
  const tagCanonical = new Map();
  tagOwnerCount.forEach((playerMap, tag) => {
    let best = null;
    playerMap.forEach((info, player) => {
      if (!best || info.count > best.count || (info.count === best.count && info.lastSi > best.lastSi))
        best = { player, ...info };
    });
    if (best) tagCanonical.set(tag, best.player);
  });
  const timelines = [];
  const allCanonical = new Set([...tagCanonical.values()]);
  allCanonical.forEach(player => {
    const myTags = new Set();
    tagCanonical.forEach((owner, tag) => { if (owner === player) myTags.add(tag); });
    const ownedMap = directOwned.get(player) || new Map();
    let firstOwnedSi = Infinity;
    ownedMap.forEach((tag, si) => { if (myTags.has(tag) && si < firstOwnedSi) firstOwnedSi = si; });
    const sessions = savesArr.map((s, si) => {
      let tag = null;
      for (const t of myTags) { if (s.countries.find(c => c.tag === t)) { tag = t; break; } }
      if (!tag) return { saveIdx: si, tag: null, country: null, isPreOwn: false, isSub: false, subPlayer: null };
      const country = s.countries.find(c => c.tag === tag) || null;
      const listedPlayer = country?.player || null;
      const isDirectlyOwned = ownedMap.get(si) === tag;
      const isPreOwn = si < firstOwnedSi;
      const isSub = !isPreOwn && !isDirectlyOwned && !!listedPlayer && listedPlayer !== player;
      return { saveIdx: si, tag, country, isPreOwn, isSub, subPlayer: isSub ? listedPlayer : null };
    });
    const tagHistory = [];
    sessions.forEach(s => { if (s.tag && !s.isPreOwn && !tagHistory.includes(s.tag)) tagHistory.push(s.tag); });
    if (!tagHistory.length) sessions.forEach(s => { if (s.tag && !tagHistory.includes(s.tag)) tagHistory.push(s.tag); });
    let currentTag = null;
    for (let i = sessions.length-1; i >= 0; i--) { if (sessions[i].tag) { currentTag = sessions[i].tag; break; } }
    timelines.push({ player, currentTag, tagHistory, sessions });
  });
  timelines.sort((a, b) => a.player.localeCompare(b.player));
  return timelines;
}

function tagHistoryBadge(tagHistory) {
  if (!tagHistory || !tagHistory.length) return '—';
  if (tagHistory.length === 1) return '<span style="font-family:Cinzel,serif;color:var(--ac);font-weight:700;">'+tagHistory[0]+'</span>';
  return tagHistory.map((t,i) => {
    const isLast = i === tagHistory.length-1;
    return '<span style="font-family:Cinzel,serif;color:'+(isLast?'var(--ac)':'var(--txd)')+';font-weight:'+(isLast?'700':'400')+';">'+t+'</span>'
      + (isLast ? '' : '<span style="color:var(--txd);font-size:9px;margin:0 2px;">→</span>');
  }).join('');
}

function fmtNum(v, decimals) {
  if (v == null) return '—';
  const n = Number(v);
  if (Math.abs(n) >= 1000) return Math.round(n).toLocaleString('en');
  return decimals != null ? n.toFixed(decimals) : n.toLocaleString('en', {maximumFractionDigits:1});
}

// ── Boot ───────────────────────────────────────────────────────────────────
function boot() {
  // Populate stat selector
  const ss = document.getElementById('gridStatSel');
  CMP_CHART_STATS.forEach(s => {
    const o = document.createElement('option');
    o.value = s.k; o.textContent = s.l;
    if (s.k === 'population') o.selected = true;
    ss.appendChild(o);
  });
  // Populate player selector
  const ps = document.getElementById('playerSel');
  timelines.forEach(tl => {
    const o = document.createElement('option');
    o.value = tl.player;
    o.textContent = tl.tagHistory.length > 1 ? tl.player+' ('+tl.tagHistory.join('→')+')' : tl.player+' ('+tl.currentTag+')';
    ps.appendChild(o);
  });
  // Tabs
  const tbar = document.getElementById('tbar');
  TABS.forEach(t => {
    const d = document.createElement('div');
    d.className = 'tab' + (t.id === curTab ? ' act' : '');
    d.textContent = t.label;
    d.onclick = () => { curTab = t.id; sortCol = null; sortDir = 'desc'; buildTabs(); renderAll(); };
    tbar.appendChild(d);
  });
  // Banner
  const changers = timelines.filter(t => t.tagHistory.length > 1);
  const hasSubs = timelines.some(t => t.sessions.some(s => s.isSub));
  const hasPreOwn = timelines.some(t => t.sessions.some(s => s.isPreOwn));
  if (changers.length || hasSubs || hasPreOwn) {
    const b = document.getElementById('banner');
    b.style.display = 'flex';
    let html = '';
    if (changers.length) html += '<span style="color:var(--ac);font-weight:700;">⚡ Tags:</span> ' + changers.map(t => '<span class="pn">'+t.player+'</span>: '+t.tagHistory.join('→')).join(' · ') + ' &nbsp;';
    if (hasPreOwn) html += '<span style="color:#777;font-style:italic;">▪ Italic = AI era</span>&nbsp;';
    if (hasSubs)   html += '<span style="color:#e8a030;">▪ ★ = Sub session</span>';
    b.innerHTML = html;
  }
  renderAll();
}

function buildTabs() {
  document.querySelectorAll('.tab').forEach((el, i) => {
    el.classList.toggle('act', TABS[i].id === curTab);
  });
  // Show/hide controls based on tab
  const statLabel = document.getElementById('statLabel');
  const statSel   = document.getElementById('gridStatSel');
  const plrLabel  = document.getElementById('playerLabel');
  const plrSel    = document.getElementById('playerSel');
  const showStat  = curTab !== 'firstlast';
  const showPlr   = curTab === 'detail';
  if (statLabel) statLabel.style.display = showStat ? '' : 'none';
  if (statSel)   statSel.style.display   = showStat ? '' : 'none';
  if (plrLabel)  plrLabel.style.display  = showPlr  ? '' : 'none';
  if (plrSel)    plrSel.style.display    = showPlr  ? '' : 'none';
}

function onStatChange() { renderAll(); }

function renderAll() {
  searchTerm = document.getElementById('search').value.toLowerCase();
  buildTabs();
  if (curTab === 'firstlast') renderFirstLast();
  else if (curTab === 'grid')  renderGrid();
  else if (curTab === 'detail') renderDetail();
}

// ── Sortable table helper ──────────────────────────────────────────────────
function thClick(col) {
  if (sortCol === col) sortDir = sortDir === 'desc' ? 'asc' : 'desc';
  else { sortCol = col; sortDir = 'desc'; }
  renderAll();
}
function sortRows(rows, col) {
  if (!col) return rows;
  return [...rows].sort((a, b) => {
    let va = a[col], vb = b[col];
    if (va == null) va = sortDir === 'desc' ? -Infinity : Infinity;
    if (vb == null) vb = sortDir === 'desc' ? -Infinity : Infinity;
    if (typeof va === 'string') va = va.toLowerCase();
    if (typeof vb === 'string') vb = vb.toLowerCase();
    return sortDir === 'asc' ? (va < vb ? -1 : va > vb ? 1 : 0) : (va > vb ? -1 : va < vb ? 1 : 0);
  });
}
function th(col, label, align) {
  const isSorted = sortCol === col;
  const arrow = isSorted ? (sortDir === 'asc' ? ' ▲' : ' ▼') : '';
  const ac = isSorted ? 'font-weight:bold;color:#c9a84c' : '';
  const aCls = align ? ' class="' + align + '"' : '';
  const sortStyle = ac ? ' style="' + ac + '"' : '';
  return '<th' + aCls + ' data-col="' + col + '" onclick="thClick(this.dataset.col)">' + label + '<span' + sortStyle + '>' + arrow + '</span></th>';
}



// ── Tab 1: First vs Last ───────────────────────────────────────────────────
function renderFirstLast() {
  const STATS = [
    {k:'population',l:'Pop'},{k:'tax_base',l:'Tax Base'},{k:'potential_tax_base',l:'PotTax'},
    {k:'eco_income',l:'Income'},{k:'army_size',l:'Army'},{k:'num_owned_locations',l:'Locs'},
    {k:'gold',l:'Treasury'},{k:'num_advances',l:'Advances'},
  ];
  let rows = [];
  const fS = saves[0], lS = saves[saves.length-1];
  timelines.forEach(tl => {
    if (searchTerm && !tl.player.toLowerCase().includes(searchTerm) && !tl.tagHistory.join(' ').toLowerCase().includes(searchTerm)) return;
    const fSes = tl.sessions.find(s => s.country);
    const lSes = [...tl.sessions].reverse().find(s => s.country);
    const fc = fSes?.country, lc = lSes?.country;
    const row = { player: tl.player, tagSort: tl.currentTag||'', tagHTML: tagHistoryBadge(tl.tagHistory),
      firstDate: fSes ? saves[fSes.saveIdx].date : '?', lastDate: lSes ? saves[lSes.saveIdx].date : '?' };
    STATS.forEach(s => {
      const fv = fc?.[s.k] ?? null, lv = lc?.[s.k] ?? null;
      row[s.k+'_f'] = fv; row[s.k+'_l'] = lv;
      row[s.k+'_d'] = (fv != null && lv != null && fv > 0) ? (lv-fv)/fv*100 : null;
    });
    rows.push(row);
  });
  rows = sortRows(rows, sortCol);

  let h = '<div class="tw"><table><thead><tr>';
  h += th('tagSort','Tag(s)','al') + th('player','Player','al') + th('_dates','Dates','al');
  STATS.forEach(s => {
    h += th(s.k+'_f', s.l+' '+fS.date) + th(s.k+'_l', s.l+' '+lS.date) + th(s.k+'_d', s.l+' Δ%');
  });
  h += '</tr></thead><tbody>';

  rows.forEach(r => {
    const lateJoin = r.firstDate !== fS.date;
    h += '<tr class="ip"><td class="al" style="white-space:nowrap;">'+r.tagHTML+'</td>';
    h += '<td class="al"><span class="pn">'+r.player+'</span></td>';
    const dateHtml = lateJoin
      ? '<span style="color:#5bc0de;font-size:10px;" title="Joined mid-campaign">⊕ '+r.firstDate+'</span><span style="color:var(--txd);font-size:10px;"> → '+r.lastDate+'</span>'
      : '<span style="color:var(--txd);font-size:10px;">'+r.firstDate+' → '+r.lastDate+'</span>';
    h += '<td class="al">'+dateHtml+'</td>';
    STATS.forEach(s => {
      const fv = r[s.k+'_f'], lv = r[s.k+'_l'], dp = r[s.k+'_d'];
      h += '<td>'+fmtNum(fv)+'</td><td>'+fmtNum(lv)+'</td>';
      h += '<td>'+(dp!=null?'<span style="color:'+(dp>=0?'var(--gr)':'var(--rd)')+'">'+(dp>=0?'+':'')+dp.toFixed(1)+'%</span>':'—')+'</td>';
    });
    h += '</tr>';
  });
  h += '</tbody></table></div>';
  document.getElementById('main').innerHTML = h;
  document.getElementById('si').innerHTML = 'Showing <span>'+rows.length+'</span> players';
}

// ── Tab 2: Session Grid ────────────────────────────────────────────────────
function renderGrid() {
  const statKey = document.getElementById('gridStatSel').value;
  let rows = [];
  timelines.forEach(tl => {
    if (searchTerm && !tl.player.toLowerCase().includes(searchTerm) && !tl.tagHistory.join(' ').toLowerCase().includes(searchTerm)) return;
    const row = { player: tl.player, tagSort: tl.currentTag||'', tagHTML: tagHistoryBadge(tl.tagHistory), _tl: tl };
    let firstOwnedVal = null, lastVal = null;
    saves.forEach((s, si) => {
      const ses = tl.sessions[si];
      const v = ses?.country?.[statKey] ?? null;
      if (v != null && !ses?.isPreOwn && firstOwnedVal === null) firstOwnedVal = v;
      if (v != null) lastVal = v;
      row['s'+si] = v;
      if (si > 0) {
        const pv = row['s'+(si-1)];
        row['d'+si] = (pv != null && v != null && pv !== 0) ? ((v-pv)/Math.abs(pv)*100) : null;
      }
    });
    row.total = (firstOwnedVal != null && lastVal != null && firstOwnedVal !== 0) ? ((lastVal-firstOwnedVal)/Math.abs(firstOwnedVal)*100) : null;
    rows.push(row);
  });
  rows = sortRows(rows, sortCol);

  let h = '<div class="tw"><table><thead><tr>';
  h += th('tagSort','Tag(s)','al') + th('player','Player','al');
  saves.forEach((s, si) => {
    h += th('s'+si, s.date, '');
    if (si > 0) h += th('d'+si, 'Δ%', '');
  });
  h += th('total','Total Δ%','') + '</tr></thead><tbody>';

  rows.forEach(row => {
    h += '<tr class="ip"><td class="al" style="white-space:nowrap;">'+row.tagHTML+'</td><td class="al"><span class="pn">'+row.player+'</span></td>';
    saves.forEach((s, si) => {
      const ses = row._tl.sessions[si];
      const v = row['s'+si];
      let vf;
      if (v != null) {
        const num = Math.abs(v) >= 1000 ? Math.round(v).toLocaleString() : v.toFixed(1);
        if      (ses?.isPreOwn) vf = '<span style="color:#777;font-style:italic;" title="AI era">'+num+'</span>';
        else if (ses?.isSub)    vf = '<span style="color:#e8a030;" title="Sub: '+(ses.subPlayer||'?')+'">'+num+'★</span>';
        else                    vf = num;
      } else vf = '—';
      h += '<td>'+vf+'</td>';
      if (si > 0) {
        const d = row['d'+si];
        const prevSes = row._tl.sessions[si-1];
        const dim = ses?.isPreOwn || prevSes?.isPreOwn;
        h += d != null
          ? '<td style="color:'+(dim?'#777':d>=0?'var(--gr)':'var(--rd)')+';font-size:10px;'+(dim?'font-style:italic;':'')+'">'+(d>=0?'+':'')+d.toFixed(1)+'%</td>'
          : '<td>—</td>';
      }
    });
    const t = row.total;
    h += t != null ? '<td style="color:'+(t>=0?'var(--gr)':'var(--rd)')+';font-weight:700;">'+(t>=0?'+':'')+t.toFixed(1)+'%</td>' : '<td>—</td>';
    h += '</tr>';
  });
  h += '</tbody></table></div>';
  document.getElementById('main').innerHTML = h;
  document.getElementById('si').innerHTML = 'Showing <span>'+rows.length+'</span> players';
}

function renderDetail() {
  const statKey = document.getElementById('gridStatSel').value;
  const selPlayer = document.getElementById('playerSel').value;
  const tl = timelines.find(t => t.player === selPlayer) || timelines[0];
  if (!tl) { document.getElementById('main').innerHTML = '<div class="info">No data.</div>'; return; }

  const DSTATS = [
    {k:'population',l:'Pop'},{k:'tax_base',l:'Tax Base'},{k:'potential_tax_base',l:'Pot.Tax'},
    {k:'eco_income',l:'Income'},{k:'net_income',l:'Net'},{k:'gold',l:'Treasury'},
    {k:'army_size',l:'Army'},{k:'num_owned_locations',l:'Locs'},{k:'num_advances',l:'Adv'},
    {k:'mil_cost_pct',l:'MilCost%'},{k:'army_per_1k',l:'Army/1k'},{k:'power_projection',l:'PwrProj'},
  ];

  let h = '<div class="tw"><table><thead><tr>';
  h += th('#','#','al') + th('date','Date','al') + th('tag','Tag','al');
  DSTATS.forEach(s => h += th(s.k, s.l, ''));
  h += '</tr></thead><tbody>';

  let rows = tl.sessions.map((ses, idx) => {
    const c = ses.country;
    let prevC = null;
    for (let i = idx-1; i >= 0; i--) { if (tl.sessions[i].country) { prevC = tl.sessions[i].country; break; } }
    const tagChanged = !ses.isPreOwn && idx > 0 && ses.tag && tl.sessions[idx-1].tag && ses.tag !== tl.sessions[idx-1].tag;
    const row = { '#': idx+1, date: saves[ses.saveIdx].date, tag: ses.tag||'—', _ses: ses, _c: c, _prevC: prevC, _tagChanged: tagChanged };
    DSTATS.forEach(s => { row[s.k] = c?.[s.k] ?? null; });
    return row;
  });
  if (sortCol && sortCol !== '#' && sortCol !== 'date' && sortCol !== 'tag') rows = sortRows(rows, sortCol);

  rows.forEach(r => {
    const ses = r._ses, c = r._c, prevC = r._prevC;
    let rowStyle = '';
    if (r._tagChanged)  rowStyle = 'border-left:3px solid var(--bl);';
    else if (ses.isPreOwn) rowStyle = 'border-left:3px solid #333;opacity:0.7;';
    else if (ses.isSub)    rowStyle = 'border-left:3px solid #e8a030;';
    h += '<tr style="'+rowStyle+'">';
    h += '<td class="al" style="color:var(--txd);font-size:10px;">'+r['#']+'</td>';
    h += '<td class="al" style="font-family:Cinzel,serif;color:var(--ac);font-size:11px;">'+r.date+'</td>';
    // Tag cell
    if (!ses.tag) h += '<td class="al" style="color:var(--txd);">—</td>';
    else if (ses.isPreOwn) h += '<td class="al"><span style="font-family:Cinzel,serif;color:#777;font-size:11px;">'+ses.tag+'</span> <span style="font-size:9px;color:#777;font-style:italic;">AI era</span></td>';
    else if (ses.isSub)    h += '<td class="al"><span style="font-family:Cinzel,serif;color:#e8a030;font-size:11px;">'+ses.tag+'</span> <span style="font-size:9px;color:#e8a030;">★sub:'+(ses.subPlayer||'?')+'</span></td>';
    else if (r._tagChanged) h += '<td class="al"><span style="font-family:Cinzel,serif;color:var(--bl);font-weight:700;font-size:11px;">'+ses.tag+'</span> <span style="font-size:9px;color:var(--bl);">⚡</span></td>';
    else h += '<td class="al"><span style="font-family:Cinzel,serif;color:var(--ac);font-weight:700;font-size:11px;">'+ses.tag+'</span></td>';
    DSTATS.forEach(s => {
      const v = c?.[s.k], pv = prevC?.[s.k];
      if (v == null) { h += '<td>—</td>'; return; }
      const fmt = Math.abs(v) >= 1000 ? Math.round(v).toLocaleString() : v.toFixed(1);
      const valColor = ses.isPreOwn ? '#777' : '';
      let cell = '<span style="color:'+valColor+';'+(ses.isPreOwn?'font-style:italic;':'')+'">'+fmt+'</span>';
      if (pv != null) {
        const diff = v - pv, pct = pv !== 0 ? diff/Math.abs(pv)*100 : 0;
        const dc = ses.isPreOwn ? '#666' : diff >= 0 ? 'var(--gr)' : 'var(--rd)';
        cell += ' <span style="font-size:9px;color:'+dc+'">'+(diff>=0?'+':'')+pct.toFixed(1)+'%</span>';
      }
      h += '<td>'+cell+'</td>';
    });
    h += '</tr>';
  });
  h += '</tbody></table></div>';
  document.getElementById('main').innerHTML = h;
  document.getElementById('si').innerHTML = 'Player: <span>'+tl.player+'</span> · Tags: <span>'+tl.tagHistory.join('→')+'</span>';
}

boot();
</script>
</body>
</html>
